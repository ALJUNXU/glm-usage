<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM 使用量监控</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <nav class="navbar">
            <h1>GLM Coding Plan 使用量监控</h1>
            <div class="nav-buttons">
                <button id="btnSettings" class="btn btn-secondary">⚙️ 设置</button>
                <button id="btnLogs" class="btn btn-secondary">📋 日志</button>
            </div>
        </nav>

        <!-- 主仪表盘 -->
        <main class="dashboard">
            <!-- 状态卡片 -->
            <div class="status-bar">
                <span id="statusIndicator" class="status-dot"></span>
                <span id="statusText">未配置</span>
                <span class="last-update">最后更新: <span id="lastUpdate">-</span></span>
            </div>

            <!-- 使用量显示 -->
            <div class="quota-cards">
                <div class="quota-card">
                    <div class="quota-header">
                        <span class="quota-title">5小时额度</span>
                        <span class="quota-period">每5小时重置</span>
                    </div>
                    <div class="quota-value" id="hourlyPercent">-</div>
                    <div class="quota-bar">
                        <div class="quota-fill" id="hourlyBar"></div>
                    </div>
                    <div class="quota-detail">
                        <span id="hourlyUsed">-</span> / <span id="hourlyTotal">-</span>
                    </div>
                </div>

                <div class="quota-card">
                    <div class="quota-header">
                        <span class="quota-title">每周额度</span>
                        <span class="quota-period">每周一重置</span>
                    </div>
                    <div class="quota-value" id="weeklyPercent">-</div>
                    <div class="quota-bar">
                        <div class="quota-fill" id="weeklyBar"></div>
                    </div>
                    <div class="quota-detail">
                        <span id="weeklyUsed">-</span> / <span id="weeklyTotal">-</span>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button id="btnRefresh" class="btn btn-primary btn-large">
                    🔄 立即刷新
                </button>
                <label class="auto-refresh">
                    <input type="checkbox" id="autoRefresh">
                    <span>自动刷新</span>
                    <select id="refreshInterval" class="interval-select">
                        <option value="5">5分钟</option>
                        <option value="10">10分钟</option>
                        <option value="30" selected>30分钟</option>
                        <option value="60">1小时</option>
                    </select>
                </label>
            </div>

            <!-- 历史图表 -->
            <div class="chart-section">
                <h3>历史趋势</h3>
                <div class="chart-container">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </main>

        <!-- 设置弹窗 -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙️ 设置</h2>
                    <button class="modal-close" onclick="closeModal('settingsModal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>智谱AI Cookie <span class="required">*</span></label>
                        <textarea id="zhipuCookie" placeholder="从浏览器开发者工具复制Cookie..." rows="3"></textarea>
                        <small>获取方法：登录 bigmodel.cn → F12 → Network → 复制任意请求的Cookie</small>
                    </div>
                    <div class="form-section">
                        <h4>GitHub 同步 (可选)</h4>
                        <div class="form-group">
                            <label>GitHub Token</label>
                            <input type="password" id="githubToken" placeholder="ghp_xxxx...">
                            <small>需要 repo 权限</small>
                        </div>
                        <div class="form-group">
                            <label>GitHub 仓库</label>
                            <input type="text" id="githubRepo" placeholder="username/repo-name">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal('settingsModal')">取消</button>
                    <button class="btn btn-primary" onclick="saveSettings()">保存</button>
                </div>
            </div>
        </div>

        <!-- 日志弹窗 -->
        <div id="logsModal" class="modal">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h2>📋 运行日志</h2>
                    <button class="modal-close" onclick="closeModal('logsModal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="logs-toolbar">
                        <button class="btn btn-small" onclick="loadLogs()">🔄 刷新</button>
                        <select id="logLines" onchange="loadLogs()">
                            <option value="50">最近50行</option>
                            <option value="100" selected>最近100行</option>
                            <option value="500">最近500行</option>
                        </select>
                    </div>
                    <pre id="logsContent" class="logs-content">加载中...</pre>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <span>正在获取数据...</span>
        </div>

        <!-- 消息提示 -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
