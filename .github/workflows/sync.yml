name: Sync GLM Usage

on:
  # 定时触发：每30分钟一次，凌晨2-7点不运行
  schedule:
    - cron: '*/30 0-17 * * *'

  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-actions.txt
          playwright install chromium

      - name: Run sync script
        env:
          ZHIPU_COOKIE: ${{ secrets.ZHIPU_COOKIE }}
        run: python github_actions_sync.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update usage data - $(date '+%Y-%m-%d %H:%M')"
          git push
